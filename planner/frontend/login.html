<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daybloom</title>
<meta name="theme-color" content="#2F7A62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daybloom">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/icon-192.png">
<style>
  :root {
    --paper: #FBF8F2; --card: #FFFFFF; --ink: #2B2E2C; --ink-soft: #6E726B;
    --line: #ECE6DA; --brand: #2F7A62; --brand-ink: #1F5946; --card-sunk: #F5F1E8;
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper: #171917; --card: #232623; --ink: #ECEAE3; --ink-soft: #9DA29A;
      --line: #32362F; --brand: #5CB394; --brand-ink: #8FD4B9; --card-sunk: #1D201E; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 24px;
    background: var(--paper); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .box { width: 100%; max-width: 360px; text-align: center; }
  .mark { font-size: 44px; }
  h1 { font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif; font-size: 30px;
    font-weight: 800; letter-spacing: -.02em; margin: 8px 0 4px; }
  p.sub { color: var(--ink-soft); margin: 0 0 26px; font-size: 15px; }
  form { display: flex; flex-direction: column; gap: 10px; }
  input { border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 14px; padding: 15px 16px; font-size: 17px; outline: none; text-align: center;
    font-family: inherit; }
  input:focus { border-color: var(--brand); }
  button { border: none; background: var(--brand); color: #fff; border-radius: 14px;
    padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif; }
  button:active { transform: scale(.98); }
  .err { color: #c0392b; font-size: 14px; min-height: 18px; margin-top: 4px; }
  @media (prefers-color-scheme: dark) { .err { color: #f0836e; } }
</style>
</head>
<body>
  <div class="box">
    <div class="mark">🌱</div>
    <h1>Daybloom</h1>
    <p class="sub">Enter your passcode to open your planner.</p>
    <form id="f">
      <input id="pc" type="password" inputmode="numeric" placeholder="Passcode" autocomplete="current-password" autofocus>
      <button type="submit">Unlock</button>
      <div class="err" id="err"></div>
    </form>
  </div>
<script>
  document.getElementById("f").addEventListener("submit", function (e) {
    e.preventDefault();
    var pc = document.getElementById("pc").value;
    var err = document.getElementById("err");
    err.textContent = "";
    fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ passcode: pc }) })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        if (res.ok) { location.href = "/"; }
        else { err.textContent = (res.d && res.d.error) || "Wrong passcode"; }
      })
      .catch(function () { err.textContent = "Something went wrong — try again."; });
  });
</script>
</body>
</html>
